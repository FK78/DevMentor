<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="5" y="5" width="190" height="190" rx="40" fill="#1C1F26"/>

  <!-- Outer glow rings -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.1"/>
  <circle cx="100" cy="100" r="46" fill="none" stroke="#F5A623" stroke-width="1.5" opacity="0.15"/>
  <circle cx="100" cy="100" r="32" fill="none" stroke="#F5A623" stroke-width="2" opacity="0.2"/>

  <!-- Radial rays -->
  <g transform="translate(100, 100)" opacity="0.3">
    <line x1="0" y1="0" x2="0" y2="-66" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-47" y2="-47" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="47" y2="-47" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-64" y2="-14" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="64" y2="-14" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-28" y2="-62" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="28" y2="-62" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Core glow -->
  <circle cx="100" cy="100" r="18" fill="#F5A623" opacity="0.12"/>
  <circle cx="100" cy="100" r="11" fill="#F5A623" opacity="0.25"/>
  <circle cx="100" cy="100" r="6" fill="#FDE8C8"/>
</svg>