<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="5" y="5" width="190" height="190" rx="40" fill="#1C1F26"/>

  <!-- Outer glow rings -->
  <circle cx="100" cy="88" r="52" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.1"/>
  <circle cx="100" cy="88" r="40" fill="none" stroke="#F5A623" stroke-width="1.5" opacity="0.15"/>
  <circle cx="100" cy="88" r="28" fill="none" stroke="#F5A623" stroke-width="2" opacity="0.2"/>

  <!-- Radial rays -->
  <g transform="translate(100, 88)" opacity="0.3">
    <line x1="0" y1="0" x2="0" y2="-58" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-41" y2="-41" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="41" y2="-41" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-56" y2="-12" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="56" y2="-12" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-24" y2="-54" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="24" y2="-54" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Core glow -->
  <circle cx="100" cy="88" r="16" fill="#F5A623" opacity="0.12"/>
  <circle cx="100" cy="88" r="10" fill="#F5A623" opacity="0.25"/>
  <circle cx="100" cy="88" r="5" fill="#FDE8C8"/>

  <!-- Text -->
  <text x="100" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#E8E0D4" letter-spacing="2.5">CODEPHAROS</text>
</svg>